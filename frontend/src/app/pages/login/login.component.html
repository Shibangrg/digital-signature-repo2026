<main class="page-container" style="max-width: 500px; margin: 4rem auto;">
  <div class="card">
    <div class="card-header text-center" style="margin-bottom: 2rem;">
      <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-primary);">
        Digital Signature Vault
      </h2>
      <p class="page-subtitle">Enterprise Authentication</p>
    </div>

    <div class="auth-tabs" style="display: flex; gap: 0.5rem; margin-bottom: 2rem; background: var(--bg-body); padding: 0.25rem; border-radius: 0.5rem;">
      <button type="button" class="btn" [class.btn-primary]="mode() === 'login'" [class.btn-secondary]="mode() !== 'login'" (click)="setMode('login')" style="flex: 1;">Login</button>
      <button type="button" class="btn" [class.btn-primary]="mode() === 'join'" [class.btn-secondary]="mode() !== 'join'" (click)="setMode('join')" style="flex: 1;">Join</button>
      <button type="button" class="btn" [class.btn-primary]="mode() === 'create'" [class.btn-secondary]="mode() !== 'create'" (click)="setMode('create')" style="flex: 1;">Create</button>
    </div>

    <div class="banner banner-error" *ngIf="errorMsg()" style="margin-bottom: 1rem;">
      <span>{{ errorMsg() }}</span>
    </div>

    <div class="banner banner-success" *ngIf="successMsg()" style="margin-bottom: 1rem; flex-direction: column; align-items: flex-start; gap: 0.5rem;">
      <span>{{ successMsg() }}</span>
      <div *ngIf="createdJoinCode()" class="mono" style="font-size: 1.5rem; background: rgba(0,0,0,0.1); padding: 0.5rem 1rem; border-radius: 4px; color: var(--text-primary); font-weight: bold; align-self: center; letter-spacing: 2px;">
        {{ createdJoinCode() }}
      </div>
      <button type="button" *ngIf="createdJoinCode()" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" routerLink="/sign">Proceed to Workspace</button>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!createdJoinCode()">
      
      <div class="form-group" *ngIf="mode() === 'create'" style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-secondary);">Organization Name</label>
        <input type="text" [ngModel]="orgName()" (ngModelChange)="orgName.set($event)" name="orgName" class="form-control" placeholder="Acme Corp" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 0.375rem; background: var(--bg-card); color: var(--text-primary);" />
      </div>

      <div class="form-group" style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-secondary);">Username</label>
        <input type="text" [ngModel]="username()" (ngModelChange)="username.set($event)" name="username" class="form-control" placeholder="Enter username" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 0.375rem; background: var(--bg-card); color: var(--text-primary);" />
      </div>

      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-secondary);">Password</label>
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" class="form-control" placeholder="Enter password" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 0.375rem; background: var(--bg-card); color: var(--text-primary);" />
      </div>

      <div class="form-group" *ngIf="mode() === 'join'" style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; color: var(--text-secondary);">Organization Join Code (Optional)</label>
        <input type="text" [ngModel]="joinCode()" (ngModelChange)="joinCode.set($event)" name="joinCode" class="form-control mono" placeholder="XXXXXX" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 0.375rem; background: var(--bg-card); color: var(--text-primary); text-transform: uppercase;" />
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.75rem;" [disabled]="loading()">
        {{ loading() ? 'Please wait...' : (mode() === 'login' ? 'Sign In' : mode() === 'create' ? 'Create Workspace' : 'Join Workspace') }}
      </button>
    </form>
  </div>
</main>
